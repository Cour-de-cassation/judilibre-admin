name: Manual Build and Deploy

on:
  workflow_dispatch: # Déclenchement manuel uniquement

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.JUDILIBRE_DOCKERHUB_USERNAME }}
          password: ${{ secrets.JUDILIBRE_DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/judilibre-admin:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/judilibre-admin:${{ github.sha }}


  deploy-to-kubernetes:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.SANDBOX_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update Deployment
        run: |
          kubectl set image deployment/judilibre-admin \
            judilibre-admin=${{ secrets.DOCKERHUB_USERNAME }}/judilibre-admin:${{ github.sha }} \
            -n judilibre-test-sandbox