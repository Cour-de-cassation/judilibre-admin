name: Check SCW Identity
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Who owns this SCW token?
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_DATA_ACCESS_KEY }}
        run: |
          echo "Access key prefix: ${SCW_ACCESS_KEY:0:10}"
          curl -s -H "X-Auth-Token: $SCW_ACCESS_KEY" \
            "https://api.scaleway.com/iam/v1alpha1/api-keys/$SCW_ACCESS_KEY"
