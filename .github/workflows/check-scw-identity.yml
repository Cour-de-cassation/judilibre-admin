name: Check SCW Identity
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Who owns this SCW token?
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_DATA_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_DATA_SECRET_KEY }}
        run: |
          curl -s -H "X-Auth-Token: $SCW_SECRET_KEY" \
            https://api.scaleway.com/iam/v1alpha1/users/me
