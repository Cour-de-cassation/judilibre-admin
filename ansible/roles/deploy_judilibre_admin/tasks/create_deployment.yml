---
- name: Création du Deployment {{ judilibre_app_id }}
  k8s:
    apply: true
    state: present
    verify_ssl: true
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: "{{ judilibre_app_id }}-deployment"
        namespace: "{{ judilibre_namespace }}"
        labels:
          app: "{{ judilibre_app_id }}"
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: "{{ judilibre_app_id }}"
        template:
          metadata:
            labels:
              app: "{{ judilibre_app_id }}"
          spec:
            containers:
              - name: "{{ judilibre_app_id }}"
                image: "{{ judliibre_admin_docker_image }}"
                ports:
                  - containerPort: "{{ judilibre_app_port }}"
                envFrom:
                  - secretRef:
                      name: "{{ judilibre_app_id }}-secret"
                resources:
                  requests:
                    memory: "256Mi"
                    cpu: "200m"
                  limits:
                    memory: "512Mi"
                    cpu: "500m"
                livenessProbe:
                  httpGet:
                    path: /healthcheck
                    port: "{{ judilibre_app_port }}"
                  initialDelaySeconds: 10
                  periodSeconds: 30
                readinessProbe:
                  httpGet:
                    path: /healthcheck
                    port: "{{ judilibre_app_port }}"
                  initialDelaySeconds: 5
                  periodSeconds: 10
