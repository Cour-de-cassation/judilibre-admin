variables:
  DOCKER_IMAGE: "judilibre/judilibre-admin:$CI_COMMIT_TAG"

stages:
  - build
  - deploy-private
  - deploy-public

# BUILD

check_if_image_is_on_dockerhub:
  stage: build
  image: docker:20.10.22
  variables:
    HTTP_PROXY: $HTTP_PROXY_DEV
    HTTPS_PROXY: $HTTPS_PROXY_DEV
  script:
    - echo $CI_JOB_TOKEN | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY

    # Vérifie si l'image existe sur Docker Hub (12 tentatives, 5s de délai)
    - |
      MAX_RETRIES=12
      DELAY=5
      COUNT=0
      until docker manifest inspect "$DOCKER_IMAGE" > /dev/null 2>&1; do
        COUNT=$((COUNT + 1))
        if [ "$COUNT" -ge "$MAX_RETRIES" ]; then
          echo "❌ Image $DOCKER_IMAGE introuvable sur Docker Hub après $MAX_RETRIES tentatives."
          exit 1
        fi
        echo "⏳ Tentative $COUNT/$MAX_RETRIES — image absente, nouvel essai dans ${DELAY}s..."
        sleep $DELAY
      done
      echo "✅ Image $DOCKER_IMAGE trouvée sur Docker Hub."
  tags:
    - docker
  rules:
    - if: "$CI_COMMIT_TAG"

# DEPLOY PRIVATE

deploy_dev:
  stage: deploy-private
  environment: "dev"
  image: alpine/ansible:2.16.1
  script:
    - mkdir /root/.ssh
    - cat $SSH_KEY > /root/.ssh/id_rsa
    - cat $KNOWN_HOSTS > /root/.ssh/known_hosts
    - chmod 600 /root/.ssh/id_rsa
    - chmod 600 /root/.ssh/known_hosts
    - ansible-playbook
        -e judliibre_admin_docker_image=$DOCKER_IMAGE
        -i ansible/inventory/dev.yml
        ansible/deploy_judilibre_admin_private.yml
        --vault-password-file=$ANSIBLE_VAULT_PASS
  tags:
    - docker
  rules:
    - if: "$CI_COMMIT_TAG"
  needs:
    - check_if_image_is_on_dockerhub


deploy_preprod:
  stage: deploy-private
  environment: "preprod"
  image: alpine/ansible:2.16.1
  script:
    - mkdir /root/.ssh
    - cat $SSH_KEY > /root/.ssh/id_rsa
    - cat $KNOWN_HOSTS > /root/.ssh/known_hosts
    - chmod 600 /root/.ssh/id_rsa
    - chmod 600 /root/.ssh/known_hosts
    - ansible-playbook
        -e judliibre_admin_docker_image=$DOCKER_IMAGE
        -i ansible/inventory/preprod.yml
        ansible/deploy_judilibre_admin_private.yml
        --vault-password-file=$ANSIBLE_VAULT_PASS
  tags:
    - docker
  rules:
    - if: "$CI_COMMIT_TAG"
      when: manual
  needs:
    - deploy_dev

# DEPLOY PUBLIC

deploy_staging:
  stage: deploy-public
  environment: "staging"
  image: alpine/ansible:2.16.1
  script:
    - mkdir -p /root/.kube
    - echo "$KUBECONFIG_STAGING" | base64 -d > /root/.kube/config
    - chmod 600 /root/.kube/config
    - ansible-galaxy collection install kubernetes.core
    - ansible-playbook
        -e judilibre_admin_docker_image=$DOCKER_IMAGE
        ansible/deploy_judilibre_admin_kube.yml
        --vault-password-file=$ANSIBLE_VAULT_PASS
  tags:
    - docker
  rules:
    - if: "$CI_COMMIT_TAG"
      when: manual

  needs:
    - deploy_preprod


